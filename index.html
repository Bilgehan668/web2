        .btn-video { background: var(--m-blue); color: white; text-align: center; padding: 8px; border-radius: 5px; text-decoration: none; font-size: 12px; font-weight: 600; }

function renderGrid() {
    const sem = document.getElementById('semSelect').value;
    const grid = document.getElementById('grid');
    grid.innerHTML = "";
    
    let currentY = 0;
    dersler.forEach(d => {
        if(sem === 'all' || d.y == sem) {
            if(d.y !== currentY && sem === 'all') {
                const header = document.createElement('div');
                header.className = 'sem-header';
                header.innerText = d.y + ". YARIYIL";
                grid.appendChild(header);
                currentY = d.y;
            }
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <span class="code-badge">${d.c}</span>
                <h3>${d.n}</h3>
                <div class="desc">${d.d}</div>
                <a href="${d.v}" target="_blank" class="btn-video">Eğitim Videoları</a>
            `;
            grid.appendChild(card);
        }
    });
}
